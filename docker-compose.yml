version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: merchant-postgres
    environment:
      POSTGRES_DB: merchant_db
      POSTGRES_USER: merchant_user
      POSTGRES_PASSWORD: merchant_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merchant_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - merchant-network

  redis:
    image: redis:7-alpine
    container_name: merchant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - merchant-network

  merchant-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: merchant-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: merchant_db
      DB_USERNAME: merchant_user
      DB_PASSWORD: merchant_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - merchant-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  merchant-network:
    driver: bridge
